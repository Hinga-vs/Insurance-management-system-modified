<!DOCTYPE html>
{% load static %}
<html lang="en" dir="ltr">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Insurance Management System</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.12.1/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        html{
            scroll-behavior:smooth;
        }

        body{
            font-family:'Poppins',sans-serif;
            background:#f4f7fc;
            color:#333;
            overflow-x:hidden;
        }

        a{
            text-decoration:none;
        }

        /* ================= HEADER ================= */

        header{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:70px;
            background:#0f172a;
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:0 35px;
            box-shadow:0 4px 20px rgba(0,0,0,.12);
            z-index:1000;
        }

        .left_area h3{
            color:#fff;
            font-size:24px;
            font-weight:700;
            letter-spacing:1px;
        }

        .left_area span{
            color:#3b82f6;
        }

        /* ================= MENU BUTTON ================= */

        #sidebar_btn{
            color:#fff;
            font-size:22px;
            cursor:pointer;
            transition:.3s;
            margin-right:20px;
        }

        #sidebar_btn:hover{
            color:#3b82f6;
        }

        /* ================= LOGOUT BUTTON ================= */

        .logout_btn{
            background:#2563eb;
            color:#fff;
            padding:10px 22px;
            border-radius:50px;
            font-weight:600;
            transition:.3s;
            box-shadow:0 8px 20px rgba(37,99,235,.25);
        }

        .logout_btn:hover{
            background:#1d4ed8;
            color:#fff;
            text-decoration:none;
            transform:translateY(-2px);
        }

        /* ================= SIDEBAR ================= */

        .sidebar{
            position:fixed;
            top:70px;
            left:0;
            width:260px;
            height:100%;
            background:#111827;
            transition:.35s ease;
            overflow-y:auto;
            box-shadow:4px 0 18px rgba(0,0,0,.08);
            padding-top:30px;
        }

        .sidebar .profile_image{
            width:110px;
            height:110px;
            border-radius:50%;
            border:4px solid #3b82f6;
            object-fit:cover;
            margin-bottom:15px;
        }

        .sidebar h4{
            color:#fff;
            font-size:20px;
            margin-bottom:5px;
        }

        .sidebar h6{
            color:#9ca3af;
            font-weight:400;
            margin-bottom:25px;
        }

        .sidebar a{
            display:flex;
            align-items:center;
            color:#d1d5db;
            padding:16px 25px;
            transition:.3s;
            font-size:15px;
            font-weight:500;
            border-left:4px solid transparent;
        }

        .sidebar a i{
            width:25px;
            font-size:18px;
            margin-right:12px;
        }

        .sidebar a:hover{
            background:#1e40af;
            color:#fff;
            border-left:4px solid #60a5fa;
            padding-left:30px;
        }

        /* ================= CONTENT ================= */

        .content{
            margin-left:260px;
            margin-top:70px;
            min-height:100vh;
            background:#f4f7fc;
            padding:35px;
            transition:.35s ease;
        }

        /* ================= COLLAPSED SIDEBAR ================= */

        #check{
            display:none;
        }

        #check:checked ~ .sidebar{
            left:-190px;
        }

        #check:checked ~ .sidebar span{
            display:none;
        }

        #check:checked ~ .sidebar a{
            padding-left:205px;
        }

        #check:checked ~ .content{
            margin-left:70px;
        }

        /* ================= SCROLLBAR ================= */

        ::-webkit-scrollbar{
            width:8px;
        }

        ::-webkit-scrollbar-thumb{
            background:#3b82f6;
            border-radius:20px;
        }

        ::-webkit-scrollbar-track{
            background:#e5e7eb;
        }

        /* ================= RESPONSIVE ================= */

        @media(max-width:768px){

            .sidebar{
                left:-260px;
            }

            .content{
                margin-left:0;
                padding:20px;
            }

            #check:checked ~ .sidebar{
                left:0;
            }

            #check:checked ~ .content{
                margin-left:0;
            }

            header{
                padding:0 20px;
            }

            .left_area h3{
                font-size:20px;
            }

            .logout_btn{
                padding:8px 18px;
                font-size:14px;
            }

        }

    </style>

</head>

<body>

<input type="checkbox" id="check">

<!-- ================= HEADER ================= -->

<header>

    <label for="check">
        <i class="fas fa-bars" id="sidebar_btn"></i>
    </label>

    <div class="left_area">
        <h3>
            Insurance <span>Management</span>
        </h3>
    </div>

    <div class="right_area">
        <a href="/logout" class="logout_btn">
            <i class="fas fa-sign-out-alt"></i>
            Logout
        </a>
    </div>

</header>

<!-- ================= SIDEBAR ================= -->

<div class="sidebar">

    <center>

        <img src="{% static customer.profile_pic.url %}"
             class="profile_image"
             alt="Profile">

        <h4>{{ request.user.first_name }}</h4>

        <h6>Customer Account</h6>

    </center>

    <a href="/customer/customer-dashboard">
        <i class="fas fa-tachometer-alt"></i>
        <span>Dashboard</span>
    </a>

    <a href="/customer/apply-policy">
        <i class="fas fa-file-signature"></i>
        <span>Apply Policy</span>
    </a>

    <a href="/customer/history">
        <i class="fas fa-history"></i>
        <span>Policy History</span>
    </a>

    <a href="/customer/ask-question">
        <i class="fas fa-comments"></i>
        <span>Ask a Question</span>
    </a>

    <a href="/customer/question-history">
        <i class="fas fa-clipboard-list"></i>
        <span>Question History</span>
    </a>

</div>

<!-- ================= MAIN CONTENT ================= -->

<div class="content">

    {% block content %}

    {% endblock content %}

</div>

</body>

{% include "insurance/footer.html" %}

</html>
